[app]
name = "steam-idle"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# STEAM_ACCOUNT и STEAM_PASSWORD задай через:
#   fly secrets set STEAM_ACCOUNT=логин STEAM_PASSWORD=пароль

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "immediate"

# Постоянное хранилище для ssfn.json (loginKey)
# Создать один раз: fly volumes create steam_data --region fra --size 1
[mounts]
  source = "steam_data"
  destination = "/app/data"
